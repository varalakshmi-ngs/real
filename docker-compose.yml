version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4040:4040"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=real_temple
      - DB_USER=root
      - DB_PASSWORD=your_db_password
      - JWT_TOKEN_SECRET=your_jwt_secret
      - CORS_ORIGIN=https://www.realtemple.com
      # Add other secrets
    depends_on:
      - mysql
    networks:
      - realtemple-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4040
      - NEXT_PUBLIC_SITE_NAME=Real Temple
      - NEXT_PUBLIC_DEFAULT_LOCALE=en
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=your_google_maps_api_key
    depends_on:
      - backend
    networks:
      - realtemple-net

  admin:
    build: ./admin
    ports:
      - "4042:80"
    environment:
      - VITE_API_BASE_URL=http://backend:4040
      - VITE_APP_NAME=Real Temple Admin
      - VITE_APP_ENV=production
      - VITE_DEFAULT_LOCALE=en
    depends_on:
      - backend
    networks:
      - realtemple-net

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=your_db_password
      - MYSQL_DATABASE=real_temple
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    networks:
      - realtemple-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - realtemple-net

volumes:
  mysql_data:

networks:
  realtemple-net:
    driver: bridge